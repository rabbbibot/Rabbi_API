<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#ffffff">
  <style>
    @font-face {
      font-family: 'Pretendard';
      font-weight: 45 920;
      font-style: normal;
      font-display: block;
      src: url('fonts/PretendardVariable.woff2') format('woff2-variations');
    }
    html, body { background: #fff; font-family: 'Pretendard', sans-serif; }
    .main { background: #fff; min-height: 100vh; }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
  <title>Rabbi API</title>
  <link rel="stylesheet" href="css/mummu-layout.css">
  <link rel="stylesheet" href="css/commission-menu.css">
  <link rel="stylesheet" href="css/page-motion.css">
</head>
<body>
  <div class="layout">
    <aside class="snb" data-page="order"></aside>
    <main class="main">
      <header class="page-header">
        <h1 class="page-title"></h1>
        <p class="page-desc"></p>
      </header>
      <section class="content-block wide order-page">
        <form class="order-form" id="order-form" novalidate></form>
        <div class="order-summary">
          <h2 class="order-summary-title"></h2>
          <p class="order-summary-price" id="order-estimate">0</p>
          <p class="order-summary-note"></p>
        </div>
        <div class="order-output">
          <h2 class="order-summary-title"></h2>
          <textarea class="order-preview" id="order-preview" rows="12" readonly></textarea>
          <div class="order-actions">
            <button type="button" class="order-action-btn order-action-btn--primary" id="order-copy"></button>
            <button type="button" class="order-action-btn" id="order-send-x"></button>
            <button type="button" class="order-action-btn" id="order-send-discord"></button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/site-config.js"></script>
  <script src="js/site-nav.js"></script>
  <script src="js/price-items.js"></script>
  <script src="js/order-items.js"></script>
  <script src="js/order-form.js"></script>
  <script src="js/commission-menu.js"></script>
  <script src="js/page-motion.js"></script>
</body>
</html>
