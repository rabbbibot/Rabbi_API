<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#ffffff">
  <style>
    @font-face {
      font-family: 'Pretendard';
      font-weight: 45 920;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PretendardVariable.woff2') format('woff2-variations');
    }
    html, body {
      background: #fff;
      font-family: 'Pretendard', sans-serif;
    }
    .main { background: #fff; min-height: 100vh; }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
  <title>Rabbi API</title>
  <link rel="stylesheet" href="css/mummu-layout.css">
  <link rel="stylesheet" href="css/commission-menu.css">
  <link rel="stylesheet" href="css/page-motion.css">
  <script src="js/page-motion-init.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="snb" data-page="intro"></aside>
    <main class="main">
      <header class="page-header">
        <h1 class="page-title">소개</h1>
      </header>
      <section class="content-block">
        <div class="intro-profile">
          <div class="intro-profile-img" aria-hidden="true"></div>
          <div class="intro-profile-info">
            <p class="intro-name">Rabbi</p>
            <p class="intro-text">Warudo API · 팬 캐릭터 제작</p>
          </div>
        </div>
        <ul class="notice-list" id="intro-links"></ul>
      </section>
    </main>
  </div>
  <script src="js/site-config.js"></script>
  <script src="js/site-nav.js"></script>
  <script>
    (function () {
      var list = document.getElementById("intro-links");
      if (!list || !window.SITE) return;

      function renderLinkIcon(link) {
        var iconKey = link.icon;
        var iconClass = "notice-link-icon" + (iconKey ? " notice-link-icon--" + iconKey : "");
        if (link.iconImage) {
          return (
            '<span class="' + iconClass + ' notice-link-icon--image" aria-hidden="true">' +
              '<img class="notice-link-icon-img" src="' + link.iconImage + '" alt="" loading="lazy" decoding="async">' +
            "</span>"
          );
        }
        var iconHtml = iconKey && window.SITE_ICONS ? SITE_ICONS[iconKey] : "";
        return '<span class="' + iconClass + '" aria-hidden="true">' + (iconHtml || "") + "</span>";
      }

      list.innerHTML = (window.SITE.links || []).map(function (link) {
        var hasLink = link.href && link.href !== "#" && link.href !== "mailto:";
        if (hasLink) {
          return (
            '<li class="notice-card">' +
              '<a href="' + link.href + '" class="notice-link"' +
                (link.external ? ' target="_blank" rel="noopener noreferrer"' : "") + ">" +
                renderLinkIcon(link) +
                '<span class="notice-link-body">' +
                  "<strong>" + link.label + "</strong>" +
                  '<span class="notice-link-desc">' + link.desc + "</span>" +
                "</span>" +
              "</a>" +
            "</li>"
          );
        }
        return (
          '<li class="notice-card">' +
            '<span class="notice-link">' +
              renderLinkIcon(link) +
              '<span class="notice-link-body">' +
                "<strong>" + link.label + "</strong>" +
                '<span class="notice-link-desc">' + link.desc + "</span>" +
              "</span>" +
            "</span>" +
          "</li>"
        );
      }).join("");
    })();
  </script>
  <script src="js/commission-menu.js"></script>
  <script src="js/page-motion.js"></script>
</body>
</html>
